name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.9.4"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run validation suite
        run: bun run validate:ci

  preflight-release-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Verify release secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          STORYFLOW_R2_BUCKET: ${{ secrets.STORYFLOW_R2_BUCKET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          missing=()
          if [ -z "$CSC_LINK" ]; then
            missing+=("Missing CSC_LINK")
          fi

          has_api_key=false
          if [ -n "$APPLE_API_KEY_BASE64" ] && [ -n "$APPLE_API_KEY_ID" ] && [ -n "$APPLE_API_ISSUER" ]; then
            has_api_key=true
          fi

          has_password=false
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_TEAM_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            has_password=true
          fi

          if [ "$has_api_key" != true ] && [ "$has_password" != true ]; then
            missing+=("Missing Apple notarization credentials")
          fi

          for name in STORYFLOW_R2_BUCKET CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name}" ]; then
              missing+=("Missing $name")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            printf '%s\n' "${missing[@]}"
            exit 1
          fi

  build-macos:
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS artifacts
        run: bun run electron:dist:mac -- --arch=${{ matrix.arch }}
        env:
          CRAFT_REQUIRE_MAC_SIGNING: "1"
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CRAFT_MACOS_NOTARIZE_ATTEMPTS: "3"
          CRAFT_MACOS_NOTARIZE_RETRY_DELAY_SECONDS: "60"

      - name: Verify macOS signing and notarization
        run: |
          set -euo pipefail
          app_dir="apps/electron/release/${{ matrix.arch == 'arm64' && 'mac-arm64' || 'mac' }}/Storyflow.app"
          dmg_file="apps/electron/release/Storyflow-${{ matrix.arch }}.dmg"
          zip_file="apps/electron/release/Storyflow-${{ matrix.arch }}.zip"
          codesign --verify --deep --strict --verbose=2 "$app_dir"
          spctl --assess --type execute --verbose=4 "$app_dir"
          xcrun stapler validate "$app_dir"
          test -f "$dmg_file"
          test -f "$zip_file"

      - name: Annotate macOS update manifest
        run: |
          set -euo pipefail
          manifest="apps/electron/release/latest-mac.yml"
          python3 scripts/merge-macos-update-manifests.py \
            "$manifest.tmp" \
            "${{ matrix.arch }}=$manifest"
          mv "$manifest.tmp" "$manifest"
          cp "$manifest" "apps/electron/release/latest-mac-${{ matrix.arch }}.yml"

      - name: Upload macOS artifacts to release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          shopt -s nullglob
          dmg_files=(apps/electron/release/Storyflow-*.dmg)
          if [ ${#dmg_files[@]} -eq 0 ]; then
            echo "No macOS artifacts found"
            exit 1
          fi
          files=("${dmg_files[@]}")
          optional_files=(
            apps/electron/release/Storyflow-*.zip
            apps/electron/release/Storyflow-*.dmg.blockmap
            apps/electron/release/Storyflow-*.zip.blockmap
            apps/electron/release/latest-mac-*.yml
          )
          for file in "${optional_files[@]}"; do
            files+=("$file")
          done
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber

  build-windows:
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows artifacts
        run: bun run electron:dist:dev:win

      - name: Upload Windows artifacts to release
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          shopt -s nullglob
          exe_files=(apps/electron/release/Storyflow-*.exe)
          files=(
            "${exe_files[@]}"
            apps/electron/release/Storyflow-*.exe.blockmap
            apps/electron/release/latest.yml
          )
          if [ ${#exe_files[@]} -eq 0 ]; then
            echo "No Windows artifacts found"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber

  create-release:
    needs:
      - validate
      - preflight-release-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - name: Create GitHub Release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes --verify-tag
          fi

      - name: Upload installer scripts to release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: gh release upload "$RELEASE_TAG" scripts/install-app.sh scripts/install-app.ps1 --clobber

  verify-release:
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - name: Merge macOS update manifests
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          cd "$tmp"
          gh release download "$RELEASE_TAG" \
            --pattern 'latest-mac-arm64.yml' \
            --pattern 'latest-mac-x64.yml'
          python3 "$GITHUB_WORKSPACE/scripts/merge-macos-update-manifests.py" \
            latest-mac.yml \
            arm64=latest-mac-arm64.yml \
            x64=latest-mac-x64.yml
          gh release upload "$RELEASE_TAG" latest-mac.yml --clobber

      - name: Verify release assets
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          asset_names="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')"
          echo "$asset_names"
          echo "$asset_names" | grep -E '^Storyflow-arm64\.dmg$'
          echo "$asset_names" | grep -E '^Storyflow-x64\.dmg$'
          echo "$asset_names" | grep -E '^Storyflow-arm64\.zip$'
          echo "$asset_names" | grep -E '^Storyflow-x64\.zip$'
          echo "$asset_names" | grep -E '^Storyflow-.*\.exe$'
          echo "$asset_names" | grep -E '^latest-mac\.yml$'
          echo "$asset_names" | grep -E '^latest-mac-arm64\.yml$'
          echo "$asset_names" | grep -E '^latest-mac-x64\.yml$'
          echo "$asset_names" | grep -E '^latest\.yml$'
          echo "$asset_names" | grep -E '^install-app\.sh$'
          echo "$asset_names" | grep -E '^install-app\.ps1$'

  publish-r2:
    needs: verify-release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release assets
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p .release-assets
          gh release download "$RELEASE_TAG" --dir .release-assets
          ls -lah .release-assets

      - name: Publish release assets to Cloudflare R2
        env:
          STORYFLOW_R2_BUCKET: ${{ secrets.STORYFLOW_R2_BUCKET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          STORYFLOW_R2_PUBLIC_BASE_URL: ${{ vars.STORYFLOW_R2_PUBLIC_BASE_URL || 'https://story.zjding.com' }}
          STORYFLOW_R2_LATEST_PREFIX: ${{ vars.STORYFLOW_R2_LATEST_PREFIX || 'latest' }}
          STORYFLOW_R2_RELEASE_PREFIX: ${{ vars.STORYFLOW_R2_RELEASE_PREFIX || 'releases' }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: bun run release:upload-r2 -- --tag="$RELEASE_TAG" --assets-dir=.release-assets
