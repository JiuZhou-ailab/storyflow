appId: com.lukilabs.craft-agent
productName: Storyflow
copyright: Copyright © 2026 Craft Docs Ltd.

electronVersion: "39.2.7"

# Hook to compile macOS 26+ Liquid Glass icon after packaging
afterPack: scripts/afterPack.cjs

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - package.json
  # Bundled assets and subprocess entrypoints are copied to dist/resources/
  # by build:copy and included through dist/**/* above. Do not also package
  # the top-level resources/ tree, or uv and subprocess bundles are duplicated.
  # Include bundled Bun runtime (platform-specific, set by build script)
  - vendor/bun/**/*
  # Include bundled Codex binary (platform-specific, downloaded by build script)
  - vendor/codex/**/*
  # Include bundled Copilot CLI binary (platform-specific, copied from node_modules by build script)
  - vendor/copilot/**/*
  # Exclude development-only trees and generated source maps from app payload.
  - "!node_modules/**/*"
  - "!src/**/*"
  - "!resources/**/*"
  - "!release/**/*"
  - "!dist/**/*.map"
  - "!**/*.map"
  - "!dist/resources/dmg-background*"

# Since SDK 0.2.113 the SDK ships a thin core (`@anthropic-ai/claude-agent-sdk`)
# and a per-platform optional dependency (`-darwin-arm64`, `-darwin-x64`, etc.)
# containing the ~210 MB native `claude` binary. We bundle both as extraResources
# below — only the binary matching the build target is shipped per artifact, so
# the platform `files` rules below also exclude the wrong-platform binaries.
#
# Why extraResources instead of `files`: since electron-builder v20.15.2,
# `node_modules` directories are auto-excluded from `files`. extraResources
# bypasses that. See: https://github.com/electron-userland/electron-builder/issues/3104
#
# Ripgrep is sourced from `@vscode/ripgrep` (was previously bundled inside the
# SDK as `vendor/ripgrep/<platform>/rg`; removed in 0.2.113).

extraMetadata:
  main: dist/main.cjs

# Auto-update: electron-updater fetches public manifests from Cloudflare R2.
publish:
  provider: generic
  url: https://story-storage.zjding.com/latest

# Disable ASAR to avoid decompression overhead and click delays
asar: false

mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  # macOS 26+ Liquid Glass: Tell macOS to look for icon in Assets.car
  # The value must match --app-icon used in actool (see afterPack.js)
  extendInfo:
    CFBundleIconName: AppIcon
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  strictVerify: true
  forceCodeSigning: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extraResources:
    # Thin core SDK (sdk.mjs + types). ~4 MB — present on every platform.
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
    # Stable alias pointing at the target-arch native binary package.
    # Populated by build-dmg.sh / build-linux.sh / build-win.ps1 before
    # electron-builder runs (`apps/electron/node_modules/@anthropic-ai/claude-agent-sdk-binary/`).
    # The runtime resolver (runtime-resolver.ts) looks here first.
    - from: node_modules/@anthropic-ai/claude-agent-sdk-binary
      to: app/node_modules/@anthropic-ai/claude-agent-sdk-binary
    # ripgrep (used by packages/server-core/src/services/search.ts).
    - from: node_modules/@vscode/ripgrep
      to: app/node_modules/@vscode/ripgrep
    # WhatsApp worker subprocess (self-contained; Baileys bundled in).
    - from: ../../packages/messaging-whatsapp-worker/dist/worker.cjs
      to: messaging-whatsapp-worker/worker.cjs
  # Exclude binaries for other platforms
  files:
    - dist/**/*
    - package.json
    - vendor/bun/**/*
    - vendor/codex/**/*
    - vendor/copilot/**/*
    - "!node_modules/**/*"
    - "!src/**/*"
    - "!resources/**/*"
    - "!release/**/*"
    - "!dist/**/*.map"
    - "!**/*.map"
    - "!dist/resources/dmg-background*"
    - "!**/vendor/codex/linux-*/**"
    - "!**/vendor/codex/win32-*/**"
    - "!**/vendor/copilot/linux-*/**"
    - "!**/vendor/copilot/win32-*/**"
    - "!**/resources/bin/win32-*/**"
    - "!**/resources/bin/linux-*/**"
  # Use predictable naming for macOS packages (applies to zip; dmg uses its own config below)
  artifactName: "Storyflow-${arch}.${ext}"
  # Official macOS releases must be Developer ID signed and Apple notarized.
  # electron-builder activates notarization when the release environment provides
  # APPLE_API_KEY/APPLE_API_KEY_ID, with APPLE_API_ISSUER only for Team keys, or
  # APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID.
  notarize: true

dmg:
  # Use predictable naming: Storyflow-arm64.dmg, Storyflow-x64.dmg
  artifactName: "Storyflow-${arch}.dmg"
  sign: true
  writeUpdateInfo: false
  # Custom background (multi-resolution TIFF with 1x+2x for retina support)
  background: resources/dmg-background.tiff
  # Use app icon as the mounted volume icon in Finder
  icon: resources/icon.icns
  iconSize: 80
  title: "Storyflow"
  contents:
    - x: 130
      y: 200
    - x: 410
      y: 200
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  # Use predictable naming: Storyflow-x64.exe
  artifactName: "Storyflow-${arch}.${ext}"
  # Keep signing/editing for the app and installer executables, but skip bundled
  # tool binaries. On Windows Server 2025, signing those extra tool executables
  # can race with electron-builder's app file copy and lock dist/main.cjs.
  signExts:
    - "!bun.exe"
    - "!claude.exe"
    - "!codex.exe"
    - "!copilot.exe"
    - "!rg.exe"
    - "!uv.exe"
  files:
    - dist/**/*
    - package.json
    - "!node_modules/**/*"
    - "!src/**/*"
    - "!resources/**/*"
    - "!release/**/*"
    - "!dist/**/*.map"
    - "!**/*.map"
    - "!dist/resources/dmg-background*"
    - "!**/vendor/codex/darwin-*/**"
    - "!**/vendor/codex/linux-*/**"
    - "!**/vendor/copilot/darwin-*/**"
    - "!**/vendor/copilot/linux-*/**"
    - "!**/resources/bin/darwin-*/**"
    - "!**/resources/bin/linux-*/**"
    # WORKAROUND: Exclude bun, codex, copilot, and uv from regular files on Windows.
    # electron-builder's npm node module collector causes EBUSY errors when copying
    # .exe files because it scans/locks files while simultaneously trying to copy them.
    # Moving them to extraResources avoids this by copying before the collector runs.
    # See: https://github.com/electron-userland/electron-builder/issues/8250
    - "!vendor/bun/**/*"
    - "!vendor/codex/**/*"
    - "!vendor/copilot/**/*"
    - "!**/resources/bin/win32-x64/**"
  # Copy executables as extraResources to avoid EBUSY file locking (see comment above)
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
    - from: node_modules/@anthropic-ai/claude-agent-sdk-binary
      to: app/node_modules/@anthropic-ai/claude-agent-sdk-binary
    - from: node_modules/@vscode/ripgrep
      to: app/node_modules/@vscode/ripgrep
    - from: vendor/bun/bun.exe
      to: vendor/bun/bun.exe
    - from: vendor/codex/win32-x64
      to: app/vendor/codex/win32-x64
    - from: vendor/copilot/win32-x64
      to: app/vendor/copilot/win32-x64
    - from: resources/bin/win32-x64
      to: app/dist/resources/bin/win32-x64
    # WhatsApp worker subprocess (self-contained; Baileys bundled in).
    - from: ../../packages/messaging-whatsapp-worker/dist/worker.cjs
      to: messaging-whatsapp-worker/worker.cjs

nsis:
  oneClick: true
  # Per-user install to %LOCALAPPDATA%\Programs\ (not Program Files).
  # Bun subprocess cannot read/write files in Program Files due to Windows permissions.
  perMachine: false
  deleteAppDataOnUninstall: true

linux:
  icon: resources/icon.png
  category: Utility
  maintainer: "Craft Docs Ltd. <support@craft.do>"
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: "Storyflow-${arch}.${ext}"
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
    - from: node_modules/@anthropic-ai/claude-agent-sdk-binary
      to: app/node_modules/@anthropic-ai/claude-agent-sdk-binary
    - from: node_modules/@vscode/ripgrep
      to: app/node_modules/@vscode/ripgrep
    # WhatsApp worker subprocess (self-contained; Baileys bundled in).
    - from: ../../packages/messaging-whatsapp-worker/dist/worker.cjs
      to: messaging-whatsapp-worker/worker.cjs
  # Exclude binaries for other platforms
  files:
    - dist/**/*
    - package.json
    - vendor/bun/**/*
    - vendor/codex/**/*
    - vendor/copilot/**/*
    - "!node_modules/**/*"
    - "!src/**/*"
    - "!resources/**/*"
    - "!release/**/*"
    - "!dist/**/*.map"
    - "!**/*.map"
    - "!dist/resources/dmg-background*"
    - "!**/vendor/codex/darwin-*/**"
    - "!**/vendor/codex/win32-*/**"
    - "!**/vendor/copilot/darwin-*/**"
    - "!**/vendor/copilot/win32-*/**"
    - "!**/resources/bin/darwin-*/**"
    - "!**/resources/bin/win32-*/**"
